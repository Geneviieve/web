<script>
(function(){
  var grid = document.getElementById('grid');
  function card(p){
    var tag = p.wip
      ? '<span class="proj-card__tag proj-card__tag--wip">In progress</span>'
      : '<span class="proj-card__tag">'+p.catLabel+'</span>';
    return '<a class="proj-card reveal" data-cat="'+p.cat+'" href="project.html?id='+p.id+'">'
      + '<div class="proj-card__img">'+tag+'<img loading="lazy" src="'+p.card+'" alt="'+p.title+'"></div>'
      + '<div class="proj-card__body"><h3>'+p.title+'</h3>'
      + '<p style="color:#4a546e;font-size:.95rem">'+p.summary+'</p>'
      + '<div class="proj-card__meta"><span class="proj-card__cat">'+p.role+' · '+p.year+'</span>'
      + '<span class="proj-card__arrow">→</span></div></div></a>';
  }
  grid.innerHTML = window.PROJECTS.map(card).join('');

  // re-observe reveals created after main.js ran
  var io = new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});},{threshold:.08});
  grid.querySelectorAll('.reveal').forEach(function(el){io.observe(el);});

  // filtering
  document.getElementById('filters').addEventListener('click', function(e){
    var btn = e.target.closest('.filter-btn'); if(!btn) return;
    document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
    var f = btn.dataset.filter;
    grid.querySelectorAll('.proj-card').forEach(function(c){
      c.classList.toggle('proj-hidden', !(f==='all' || c.dataset.cat===f));
    });
  });
})();
</script>
