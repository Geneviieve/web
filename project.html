<script src="js/projects.js"></script>
<script src="js/main.js"></script>
<script>
(function(){
  function qs(k){return new URLSearchParams(location.search).get(k);}
  var id = qs('id');
  var list = window.PROJECTS;
  var i = Math.max(0, list.findIndex(function(p){return p.id===id;}));
  var p = list[i] || list[0];
  document.title = p.title + ', Marsha Genevieve Nandana';

  function esc(s){return s;}
  function renderBlock(b){
    var h = '';
    if(b.h) h += '<h2>'+b.h+'</h2>';
    if(b.p) h += b.p.map(function(x){return '<p>'+x+'</p>';}).join('');
    if(b.pillars) h += '<div class="pillars">'+b.pillars.map(function(pl){return '<div class="pillar"><h4>'+pl.t+'</h4><p>'+pl.d+'</p></div>';}).join('')+'</div>';
    if(b.callout) return '<div class="callout">“'+b.callout+'”</div>';
    if(b.tech) h += '<div class="tech-list">'+b.tech.map(function(t){return '<span>'+t+'</span>';}).join('')+'</div>';
    if(b.gallery) h += '<div class="gallery">'+b.gallery.map(function(src){return '<a href="#" data-img="'+src+'"><img loading="lazy" src="'+src+'" alt="'+p.title+'"></a>';}).join('')+'</div>';
    if(b.note) return '<div class="note">'+b.note+'</div>';
    return '<div class="block reveal">'+h+'</div>';
  }

  var tags = (p.tools||[]).map(function(t){return '<span>'+t+'</span>';}).join('');
  var ctaBtn = '';
  if(p.links && p.links.github) ctaBtn += '<a class="btn btn-primary" target="_blank" rel="noopener" href="'+p.links.github+'">View on GitHub ↗</a> ';
  if(p.links && p.links.demo) ctaBtn += '<a class="btn btn-outline" style="border-color:#fff;color:#fff" target="_blank" rel="noopener" href="'+p.links.demo+'">Watch demo ↗</a>';

  var hero = '<section class="detail-hero"><div class="container detail-hero__inner">'
    + '<div class="crumbs"><a href="index.html">Home</a> / <a href="portfolio.html">Portfolio</a> / <span>'+p.title+'</span></div>'
    + '<div class="tags">'+tags+'</div>'
    + '<h1>'+p.title+'</h1>'
    + '<p class="summary">'+p.summary+'</p>'
    + '<div class="detail-hero__meta">'
      + '<div><span>Role</span><b>'+p.role+'</b></div>'
      + '<div><span>Type</span><b>'+p.type+'</b></div>'
      + '<div><span>Year</span><b>'+p.year+'</b></div>'
    + '</div>'
    + (ctaBtn?('<div>'+ctaBtn+'</div>'):'')
    + '</div></section>';

  var body = '<section class="detail-body"><div class="container"><div class="detail-body__grid">'
    + p.blocks.map(renderBlock).join('')
    + '</div>';

  // prev / next
  var prev = list[(i-1+list.length)%list.length], next = list[(i+1)%list.length];
  body += '<div class="detail-nav">'
    + '<a class="btn btn-ghost" href="project.html?id='+prev.id+'">← '+prev.title+'</a>'
    + '<a class="btn btn-ghost" href="project.html?id='+next.id+'">'+next.title+' →</a>'
    + '</div></section>';

  document.getElementById('main').innerHTML = hero + body;

  // reveals
  var io = new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});},{threshold:.08});
  document.querySelectorAll('.reveal').forEach(function(el){io.observe(el);});

  // lightbox
  var lb=document.getElementById('lb'),lbImg=document.getElementById('lbImg');
  document.getElementById('main').addEventListener('click',function(e){
    var a=e.target.closest('[data-img]'); if(!a) return; e.preventDefault();
    lbImg.src=a.dataset.img; lb.classList.add('open');
  });
  function close(){lb.classList.remove('open');lbImg.src='';}
  lb.addEventListener('click',function(e){if(e.target===lb||e.target.id==='lbClose')close();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')close();});
})();
</script>
</body>
</html>
